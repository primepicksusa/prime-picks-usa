<!DOCTYPE html>
<html>
<head>
<title>Prime Picks USA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  .whatsapp-float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  width:60px;
  height:60px;
  border-radius:50%;
  text-align:center;
  font-size:30px;
  box-shadow:0 0 20px rgba(37,211,102,0.8);
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  transition:0.3s;
}

.whatsapp-float:hover{
  transform:scale(1.1);
  box-shadow:0 0 30px rgba(37,211,102,1);
}
  <a href="https://wa.me/916386256151?text=Hello%20I%20want%20to%20know%20more%20about%20your%20products"
class="whatsapp-float" target="_blank">
💬
</a>
body{
  font-family: 'Segoe UI', Arial, sans-serif;
  margin:0;
  background: #38bdf8;   /* Sky Blue */
  color: white;          /* White text */
}

header{
  background:linear-gradient(90deg,#b22234,#3c3b6e);
  color:white;
  text-align:center;
  padding:40px 20px;
}

header h1{
  margin:0;
  font-size:36px;
}

header p{
  margin-top:10px;
  font-size:18px;
}

.products{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:40px 20px;
}

.card{
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(6px);
  width:280px;
  margin:20px;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  transition:0.3s;
  color:white;
}

.card:hover{
  transform:translateY(-8px);
}

.badge{
  background:#ff3b3b;
  color:white;
  padding:5px 10px;
  font-size:12px;
  position:absolute;
  margin:10px;
  border-radius:5px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 5px #ff3b3b;}
  50%{box-shadow:0 0 20px #ff3b3b;}
  100%{box-shadow:0 0 5px #ff3b3b;}
}
.card img{
  width:100%;
}

.card-content{
  padding:20px;
  text-align:center;
}

.price{
  font-size:20px;
  font-weight:bold;
  margin:10px 0;
}

button{
  background: linear-gradient(90deg,#ff416c,#ff4b2b);
  color:white;
  border:none;
  padding:12px;
  width:100%;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  font-weight:bold;
  transition:0.3s;
  box-shadow:0 0 15px rgba(255,75,43,0.6);
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(255,75,43,0.9);
}

footer{
  background:black;
  color:white;
  text-align:center;
  padding:20px;
  margin-top:40px;
}
  
</style>
</head>

<body>

<header>
<h1>🇺🇸 Prime Picks USA</h1>
<p>Top Trending Products | Fast Shipping | Limited Deals</p>
</header>

<div class="products">

<div class="card">
<div class="badge">Best Seller</div>
<img src="https://via.placeholder.com/300">
<div class="card-content">
<h3>Wireless Mini Earbuds</h3>
<div class="price">
<span style="text-decoration:line-through;color:gray;font-size:14px;">$49.99</span>
<br>
<span style="color:#00ff99;font-size:22px;">$29.99</span>
</div>
<button onclick="order('Wireless Mini Earbuds - $29.99')">Order Now</button>
</div>
</div>

<div class="card">
<div class="badge">Hot Deal</div>
<img src="https://via.placeholder.com/300">
<div class="card-content">
<h3>Car Phone Holder 360°</h3>
<div class="price">$14.99</div>
<button onclick="order('Car Phone Holder 360° - $14.99')">Order Now</button>
</div>
</div>

<div class="card">
<div class="badge">Trending</div>
<img src="https://via.placeholder.com/300">
<div class="card-content">
<h3>Portable Blender Bottle</h3>
<div class="price">$24.99</div>
<button onclick="order('Portable Blender Bottle - $24.99')">Order Now</button>
</div>
</div>

</div>

<footer>
© 2026 Prime Picks USA | All Rights Reserved
</footer>

<script>
function order(product){
var number="916386256151";
var message="Hello, I want to order: "+product;
var url="https://wa.me/"+number+"?text="+encodeURIComponent(message);
window.open(url,'_blank');
}
</script>

</body>
</html>
