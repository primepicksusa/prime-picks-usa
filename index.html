<!DOCTYPE html>
<html>
<head>
  <title>Prime Picks USA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; margin: 0; background: #f4f4f4; }
    header { background: black; color: white; padding: 15px; text-align: center; }
    .products { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
    .card {
      background: white;
      width: 250px;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      text-align: center;
    }
    img { width: 100%; border-radius: 10px; }
    button {
      background: black;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover { background: #444; }
  </style>
</head>
<body>

<header>
  <h1>Prime Picks USA</h1>
  <p>Trending Products | Fast Shipping | Best Deals</p>
</header>

<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="Product">
    <h3>Wireless Mini Earbuds</h3>
    <p>$29.99</p>
    <button onclick="order('Wireless Mini Earbuds - $29.99')">Order on WhatsApp</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="Product">
    <h3>Car Phone Holder 360°</h3>
    <p>$14.99</p>
    <button onclick="order('Car Phone Holder 360° - $14.99')">Order on WhatsApp</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="Product">
    <h3>Portable Blender Bottle</h3>
    <p>$24.99</p>
    <button onclick="order('Portable Blender Bottle - $24.99')">Order on WhatsApp</button>
  </div>

</div>

<script>
function order(product) {
  var number = "916386256151";
  var message = "Hello, I want to order: " + product;
  var url = "https://wa.me/" + number + "?text=" + encodeURIComponent(message);
  window.open(url, '_blank');
}
</script>

</body>
</html>
