<!DOCTYPE html>
<html>
<head>
<title>Prime Picks USA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: 'Segoe UI', Arial, sans-serif;
  margin:0;
  background:
    linear-gradient(rgba(15,15,15,0.92), rgba(15,15,15,0.95)),
    url('https://images.pexels.com/photos/1103970/pexels-photo-1103970.jpeg');
  background-size: cover;
  background-attachment: fixed;
  background-position: center;
  color:white;
}  

header{
  background:linear-gradient(90deg,#b22234,#3c3b6e);
  color:white;
  text-align:center;
  padding:40px 20px;
}

header h1{
  margin:0;
  font-size:36px;
}

header p{
  margin-top:10px;
  font-size:18px;
}

.products{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:40px 20px;
}

.card{
  background: rgba(31,31,46,0.9);
  backdrop-filter: blur(6px);
  width:280px;
  margin:20px;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 15px 35px rgba(0,0,0,0.4);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
}

.badge{
  background:#ff3b3b;
  color:white;
  padding:5px 10px;
  font-size:12px;
  position:absolute;
  margin:10px;
  border-radius:5px;
}

.card img{
  width:100%;
}

.card-content{
  padding:20px;
  text-align:center;
}

.price{
  font-size:20px;
  font-weight:bold;
  margin:10px 0;
}

button{
  background:#3c3b6e;
  color:white;
  border:none;
  padding:12px;
  width:100%;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  font-weight:bold;
}

button:hover{
  background:#b22234;
}

footer{
  background:black;
  color:white;
  text-align:center;
  padding:20px;
  margin-top:40px;
}
</style>
</head>

<body>

<header>
<h1>🇺🇸 Prime Picks USA</h1>
<p>Top Trending Products | Fast Shipping | Limited Deals</p>
</header>

<div class="products">

<div class="card">
<div class="badge">Best Seller</div>
<img src="https://via.placeholder.com/300">
<div class="card-content">
<h3>Wireless Mini Earbuds</h3>
<div class="price">$29.99</div>
<button onclick="order('Wireless Mini Earbuds - $29.99')">Order Now</button>
</div>
</div>

<div class="card">
<div class="badge">Hot Deal</div>
<img src="https://via.placeholder.com/300">
<div class="card-content">
<h3>Car Phone Holder 360°</h3>
<div class="price">$14.99</div>
<button onclick="order('Car Phone Holder 360° - $14.99')">Order Now</button>
</div>
</div>

<div class="card">
<div class="badge">Trending</div>
<img src="https://via.placeholder.com/300">
<div class="card-content">
<h3>Portable Blender Bottle</h3>
<div class="price">$24.99</div>
<button onclick="order('Portable Blender Bottle - $24.99')">Order Now</button>
</div>
</div>

</div>

<footer>
© 2026 Prime Picks USA | All Rights Reserved
</footer>

<script>
function order(product){
var number="916386256151";
var message="Hello, I want to order: "+product;
var url="https://wa.me/"+number+"?text="+encodeURIComponent(message);
window.open(url,'_blank');
}
</script>

</body>
</html>
