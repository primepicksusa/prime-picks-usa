<!DOCTYPE html>
<html>
<head>
<title>Prime Picks USA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#38bdf8; /* Sky Blue */
  color:white;
}

header{
  background:#0ea5e9;
  text-align:center;
  padding:30px;
}

header h1{
  margin:0;
  font-size:32px;
}

.products{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:30px;
}

.card{
  background:#0f172a; /* Dark card for visibility */
  width:280px;
  margin:20px;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
  transition:0.3s;
  color:white;
}

.card:hover{
  transform:translateY(-5px);
}

.badge{
  background:red;
  padding:5px 10px;
  font-size:12px;
  position:absolute;
  margin:10px;
  border-radius:5px;
}

.card img{
  width:100%;
}

.card-content{
  padding:20px;
  text-align:center;
}

.price{
  font-size:20px;
  font-weight:bold;
  margin:10px 0;
  color:#22c55e;
}

button{
  background:#22c55e;
  color:white;
  border:none;
  padding:12px;
  width:100%;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#16a34a;
}

footer{
  background:#0f172a;
  text-align:center;
  padding:20px;
  margin-top:30px;
}
</style>
</head>

<body>

<header>
<h1>Prime Picks USA</h1>
<p>Trending Products | Fast Shipping</p>
</header>

<div class="products">

<div class="card">
<div class="card-content">
<h3>Wireless Mini Earbuds</h3>
<div class="price">$29.99</div>
<button onclick="order('Wireless Mini Earbuds - $29.99')">Order Now</button>
</div>
</div>

<div class="card">
<div class="card-content">
<h3>Car Phone Holder 360°</h3>
<div class="price">$14.99</div>
<button onclick="order('Car Phone Holder 360° - $14.99')">Order Now</button>
</div>
</div>

<div class="card">
<div class="card-content">
<h3>Portable Blender Bottle</h3>
<div class="price">$24.99</div>
<button onclick="order('Portable Blender Bottle - $24.99')">Order Now</button>
</div>
</div>

</div>

<footer>
© 2026 Prime Picks USA
</footer>

<script>
function order(product){
var number="916386256151";
var message="Hello, I want to order: "+product;
var url="https://wa.me/"+number+"?text="+encodeURIComponent(message);
window.open(url,'_blank');
}
</script>

</body>
</html>
